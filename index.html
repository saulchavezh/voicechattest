<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Histórico</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.browser.js"></script>

    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f1f5f9; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        button { background: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #64748b; }
        #error-box { color: red; font-size: 0.7rem; margin-top: 10px; display: none; background: #fee2e2; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Personaje Histórico</h2>
        <button id="mainBtn" disabled>Cargando...</button>
        <div id="status">Iniciando sistema...</div>
        <div id="error-box"></div>
    </div>

    <script>
        // --- TUS CLAVES AQUÍ ---
        const PUBLIC_KEY = '30fad02a-d560-44bc-a6ae-d992ec97cb66';
        const ASSISTANT_ID = '110d7e91-85e0-401f-93b0-90697d22b5c3';
        // -----------------------

        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        const errBox = document.getElementById('error-box');

        let vapi = null;
        let activa = false;

        // Función para intentar conectar con Vapi
        function inicializar() {
            try {
                // Intentamos encontrar la librería en cualquier rincón del navegador
                const SDK = window.Vapi;
                
                if (!SDK) {
                    status.innerText = "Error: Librería no encontrada";
                    errBox.style.display = "block";
                    errBox.innerText = "El navegador no pudo cargar el archivo Vapi. Revisa tu conexión o usa Chrome.";
                    return;
                }

                vapi = new SDK(PUBLIC_KEY);
                btn.innerText = "Hablar ahora";
                btn.disabled = false;
                status.innerText = "Sistema Listo";

                // Eventos
                vapi.on('call-start', () => {
                    activa = true;
                    btn.innerText = "Terminar Charla";
                    status.innerText = "En línea con el personaje";
                });

                vapi.on('call-end', () => {
                    activa = false;
                    btn.innerText = "Hablar ahora";
                    status.innerText = "Llamada finalizada";
                });

                vapi.on('error', (e) => {
                    errBox.style.display = "block";
                    errBox.innerText = "Error de Vapi: " + JSON.stringify(e);
                });

            } catch (e) {
                errBox.style.display = "block";
                errBox.innerText = "Fallo crítico: " + e.message;
            }
        }

        // Ejecutar cuando la página termine de cargar
        window.onload = inicializar;

        btn.onclick = () => {
            if (!vapi) return;
            if (activa) {
                vapi.stop();
            } else {
                status.innerText = "Llamando...";
                vapi.start(ASSISTANT_ID);
            }
        };
    </script>
</body>
</html>
