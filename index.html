<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Personaje Histórico</title>
    
    <script src="https://unpkg.com/@vapi-ai/web@latest/dist/vapi.browser.js"></script>

    <style>
        :root { --primary: #2563eb; --danger: #dc2626; --bg: #f8fafc; }
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; background-color: var(--bg);
        }
        .container {
            text-align: center; background: white; padding: 2.5rem;
            border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 85%; max-width: 400px;
        }
        button {
            background-color: var(--primary); color: white; border: none;
            padding: 18px 40px; font-size: 1.1rem; font-weight: 600;
            border-radius: 50px; cursor: pointer; width: 100%; transition: 0.3s;
        }
        button.active { background-color: var(--danger); }
        #status { margin-top: 1.5rem; font-size: 0.85rem; color: #94a3b8; font-weight: bold; }
        #debug { color: red; font-size: 0.7rem; margin-top: 10px; display: none; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="charName">Personaje Histórico</h1>
        <p>Pulsa el botón para hablar</p>
        <button id="vapiButton">Cargando sistema...</button>
        <div id="status">ESTADO: INICIALIZANDO</div>
        <div id="debug"></div>
    </div>

    <script>
        // 1. TUS CLAVES (Cópialas con cuidado)
        const PUBLIC_KEY = '30fad02a-d560-44bc-a6ae-d992ec97cb66'; 
        const ASSISTANT_ID = '110d7e91-85e0-401f-93b0-90697d22b5c3';

        let vapiInstance = null;
        let isCallActive = false;

        const btn = document.getElementById('vapiButton');
        const statusText = document.getElementById('status');
        const debugDiv = document.getElementById('debug');

        // Esta función se ejecuta solo cuando TODO está cargado
        window.onload = function() {
            try {
                // Intentamos detectar Vapi de dos formas posibles
                const VapiConstructor = window.Vapi || (window.VapiClient ? window.VapiClient.Vapi : null);
                
                if (!VapiConstructor) {
                    throw new Error("No se pudo encontrar la librería Vapi en el navegador.");
                }

                vapiInstance = new VapiConstructor(PUBLIC_KEY);
                btn.innerText = "Iniciar Conversación";
                statusText.innerText = "ESTADO: LISTO";

                // Configurar eventos
                vapiInstance.on('call-start', () => {
                    isCallActive = true;
                    btn.innerText = "Terminar Charla";
                    btn.classList.add('active');
                    statusText.innerText = "ESTADO: EN LÍNEA";
                });

                vapiInstance.on('call-end', () => {
                    isCallActive = false;
                    btn.innerText = "Iniciar Conversación";
                    btn.classList.remove('active');
                    statusText.innerText = "ESTADO: DESCONECTADO";
                });

                vapiInstance.on('error', (e) => {
                    console.error(e);
                    debugDiv.style.display = "block";
                    debugDiv.innerText = "Error de Vapi: " + (e.message || JSON.stringify(e));
                });

            } catch (err) {
                btn.innerText = "Error de Carga";
                debugDiv.style.display = "block";
                debugDiv.innerText = err.message;
            }
        };

        btn.onclick = async () => {
            if (!vapiInstance) return;
            
            if (isCallActive) {
                vapiInstance.stop();
            } else {
                statusText.innerText = "ESTADO: CONECTANDO...";
                try {
                    await vapiInstance.start(ASSISTANT_ID);
                } catch (err) {
                    debugDiv.style.display = "block";
                    debugDiv.innerText = "Error al iniciar: " + err.message;
                }
            }
        };
    </script>
</body>
</html>
