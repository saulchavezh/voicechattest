<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Histórico</title>
    
    <script src="https://unpkg.com/@vapi-ai/web@2.0.0/dist/vapi.browser.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #1a1a1a; color: white; }
        .box { background: #262626; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 350px; }
        h2 { margin-bottom: 30px; font-size: 1.8rem; }
        button { background: #3b82f6; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #404040; color: #737373; cursor: wait; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #a3a3a3; font-weight: 500; }
        #error-box { color: #f87171; font-size: 0.75rem; margin-top: 15px; display: none; background: rgba(127, 29, 29, 0.3); padding: 12px; border-radius: 8px; border: 1px solid #7f1d1d; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Personaje Histórico</h2>
        <button id="mainBtn" disabled>Cargando sistema...</button>
        <div id="status">Buscando librería Vapi...</div>
        <div id="error-box"></div>
    </div>

    <script>
        // --- TUS CLAVES (Verifica que no tengan espacios al final) ---
        const PUBLIC_KEY = '30fad02a-d560-44bc-a6ae-d992ec97cb66'; 
        const ASSISTANT_ID = '110d7e91-85e0-401f-93b0-90697d22b5c3';
        // ------------------------------------------------------------

        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        const errBox = document.getElementById('error-box');

        let vapi = null;
        let activa = false;
        let intentos = 0;

        // FUNCIÓN DETECTIVE: Busca la librería cada medio segundo
        function buscarLibreria() {
            intentos++;
            // Vapi suele guardarse en window.Vapi o window.vapiSDK
            const SDK = window.Vapi || window.vapiSDK;

            if (SDK) {
                console.log("¡Librería encontrada!");
                iniciarApp(SDK);
            } else if (intentos < 10) {
                status.innerText = "Reintentando conexión (" + intentos + "/10)...";
                setTimeout(buscarLibreria, 500);
            } else {
                status.innerText = "Fallo al cargar";
                errBox.style.display = "block";
                errBox.innerText = "No se detectó Vapi. Intenta abrir este link en una PESTAÑA DE INCÓGNITO para limpiar la caché de GitHub.";
            }
        }

        function iniciarApp(SDK) {
            try {
                vapi = new SDK(PUBLIC_KEY);
                btn.innerText = "Iniciar Conversación";
                btn.disabled = false;
                status.innerText = "SISTEMA LISTO";

                vapi.on('call-start', () => {
                    activa = true;
                    btn.innerText = "Terminar Charla";
                    btn.style.background = "#ef4444";
                    status.innerText = "CONECTADO";
                });

                vapi.on('call-end', () => {
                    activa = false;
                    btn.innerText = "Iniciar Conversación";
                    btn.style.background = "#3b82f6";
                    status.innerText = "DESCONECTADO";
                });

                vapi.on('error', (e) => {
                    errBox.style.display = "block";
                    errBox.innerText = "Error de Vapi: " + (e.message || "Problema de conexión");
                });
            } catch (e) {
                errBox.style.display = "block";
                errBox.innerText = "Error de inicio: " + e.message;
            }
        }

        btn.onclick = () => {
            if (!vapi) return;
            if (activa) {
                vapi.stop();
            } else {
                status.innerText = "LLAMANDO...";
                vapi.start(ASSISTANT_ID);
            }
        };

        // Arrancamos la búsqueda
        buscarLibreria();
    </script>
</body>
</html>
