<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Histórico</title>
    <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.browser.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 80%; }
        button { background-color: #007bff; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        button.active { background-color: #dc3545; }
        .status { margin-top: 20px; color: #666; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Personaje Histórico</h1>
        <p>Pulsa el botón y di "Hola"</p>
        <button id="vapiButton">Hablar con el Personaje</button>
        <div id="status" class="status">Desconectado</div>
    </div>

    <script>
        // CONFIGURACIÓN: Pon aquí tus datos de Vapi
        const vapi = new Vapi('30fad02a-d560-44bc-a6ae-d992ec97cb66');
        const assistantId = '110d7e91-85e0-401f-93b0-90697d22b5c3';

        const btn = document.getElementById('vapiButton');
        const status = document.getElementById('status');
        let isActive = false;

        btn.onclick = () => {
            if (isActive) {
                vapi.stop();
            } else {
                vapi.start(assistantId);
                status.innerText = "Conectando...";
            }
        };

        vapi.on('call-start', () => {
            isActive = true;
            btn.innerText = "Terminar Charla";
            btn.classList.add('active');
            status.innerText = "Escuchando... Di algo.";
        });

        vapi.on('call-end', () => {
            isActive = false;
            btn.innerText = "Hablar con el Personaje";
            btn.classList.remove('active');
            status.innerText = "Desconectado";
        });
    </script>
</body>
</html>
