<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Chat</title>

  <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web/dist/index.min.js"></script>
</head>
<body style="font-family: Arial; text-align:center; margin-top:100px;">

<h1>Chat de Voz</h1>

<button id="start">Iniciar conversación</button>

<p id="status">Esperando...</p>

<script>
const publicKey = "30fad02a-d560-44bc-a6ae-d992ec97cb66";
const assistantId = "110d7e91-85e0-401f-93b0-90697d22b5c3";

const button = document.getElementById("start");
const status = document.getElementById("status");

const vapi = new Vapi(publicKey);

let started = false;

button.onclick = async () => {
  try {
    if (!started) {
      status.innerText = "Iniciando...";

      await vapi.start(assistantId);

      started = true;
      button.innerText = "Finalizar conversación";
      status.innerText = "Conversación activa";
    } else {
      await vapi.stop();

      started = false;
      button.innerText = "Iniciar conversación";
      status.innerText = "Conversación finalizada";
    }
  } catch (err) {
    console.error(err);
    status.innerText = "ERROR: " + err.message;
  }
};

vapi.on("call-start", () => {
  status.innerText = "Llamada iniciada";
});

vapi.on("call-end", () => {
  status.innerText = "Llamada terminada";
  started = false;
  button.innerText = "Iniciar conversación";
});

vapi.on("error", (e) => {
  console.error(e);
  status.innerText = "Error detectado";
});
</script>

</body>
</html>
